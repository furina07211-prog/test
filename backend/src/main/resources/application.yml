server:
  port: 8080

spring:
  application:
    name: fruit-warehouse
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fruit_warehouse?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.fruit.warehouse.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: fruit-warehouse-secret-key-2024-must-be-at-least-256-bits-long!!
  expiration: 86400000

alert:
  expiry-warning-days: 3
  low-stock-check-cron: "0 0 8 * * ?"
  expiry-check-cron: "0 0 7 * * ?"
  snapshot-cron: "0 0 1 * * ?"

logging:
  level:
    com.fruit.warehouse: debug

knife4j:
  enable: true
  setting:
    language: zh_cn
